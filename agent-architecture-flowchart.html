<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Agent — Complete Architecture Flowchart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
  #controls { position: fixed; top: 16px; right: 16px; z-index: 10; display: flex; gap: 8px; }
  #controls button { width: 36px; height: 36px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  #controls button:hover { background: #f5f5f5; }
  #title-bar { position: fixed; top: 16px; left: 16px; z-index: 10; font-size: 13px; color: #888; }
  #legend { position: fixed; bottom: 16px; left: 16px; z-index: 10; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; font-size: 11px; color: #666; line-height: 1.8; }
  #canvas { width: 100%; height: 100%; cursor: grab; }
  #canvas:active { cursor: grabbing; }
  #canvas svg { display: block; }
  .node rect, .node circle { stroke: #222; stroke-width: 1.2; }
  .process rect { fill: #fff; rx: 6; }
  .decision rect { fill: #f8f8f8; rx: 0; transform: rotate(45deg); }
  .terminal rect { fill: #222; rx: 20; }
  .terminal text { fill: #fff; }
  .side-effect rect { fill: #fff; stroke-dasharray: 5 3; rx: 6; }
  .reject rect { fill: #fff; stroke: #c00; rx: 6; }
  .reject text.label { fill: #c00; }
  .checkpoint rect { fill: #f5f5f5; stroke: #222; stroke-width: 1; rx: 4; stroke-dasharray: 3 2; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  text.label { font-size: 12px; fill: #222; font-weight: 500; }
  text.sub { font-size: 10px; fill: #777; }
  text.reject-label { font-size: 10px; fill: #c00; font-weight: 500; }
  text.side-label { font-size: 10px; fill: #666; font-style: italic; }
  text.connector { font-size: 9px; fill: #999; }
  text.section-title { font-size: 14px; fill: #222; font-weight: 600; letter-spacing: 0.5px; }
  text.section-sub { font-size: 10px; fill: #aaa; letter-spacing: 1px; text-transform: uppercase; }
  text.loop-label { font-size: 11px; fill: #555; font-weight: 600; letter-spacing: 0.5px; }
  line, path, polyline { stroke: #222; stroke-width: 1; fill: none; }
  .dash { stroke-dasharray: 4 3; stroke: #999; }
  marker path { fill: #222; }
  .reject-line { stroke: #c00; }
  .side-line { stroke: #999; stroke-dasharray: 4 3; }
  .section-bg { fill: #fafafa; stroke: #e5e5e5; stroke-width: 0.5; rx: 8; }
  .loop-bg { fill: #f0f0f0; stroke: #bbb; stroke-width: 0.8; rx: 6; stroke-dasharray: 6 3; }
</style>
</head>
<body>

<div id="title-bar">Enterprise AI Agent — Complete Architecture Flowchart &nbsp;|&nbsp; Scroll to zoom, drag to pan</div>
<div id="controls">
  <button onclick="zoomIn()" title="Zoom in">+</button>
  <button onclick="zoomOut()" title="Zoom out">−</button>
  <button onclick="resetView()" title="Reset view">⟲</button>
</div>

<div id="legend">
  <strong>Legend</strong><br>
  ▬ Solid box = process step<br>
  ◇ Diamond = decision point<br>
  ┅ Dashed box = side effect (async)<br>
  <span style="color:#c00">▬ Red box = rejection / error</span><br>
  ▭ Rounded terminal = start / end<br>
  ┄ Dotted region = loop boundary
</div>

<div id="canvas">
<svg id="svg" width="1500" height="5600" viewBox="0 0 1500 5600">
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9z" fill="#222"/>
  </marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9z" fill="#c00"/>
  </marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9z" fill="#999"/>
  </marker>
</defs>

<!-- ==================== SECTION 0: CLIENT ==================== -->
<rect class="section-bg" x="30" y="20" width="740" height="130"/>
<text class="section-title" x="55" y="50">Client</text>
<text class="section-sub" x="55" y="66">tier 0</text>

<g class="terminal" transform="translate(280,75)">
  <rect x="0" y="0" width="240" height="40" rx="20"/>
  <text class="label" x="120" y="24" text-anchor="middle" fill="#fff">User sends query</text>
</g>

<line x1="400" y1="115" x2="400" y2="180" marker-end="url(#ah)"/>
<text class="connector" x="408" y="152">HTTPS + JWT + JSON body</text>

<!-- ==================== SECTION 1: EXTERNAL LB ==================== -->
<rect class="section-bg" x="30" y="170" width="740" height="180"/>
<text class="section-title" x="55" y="200">External Load Balancer (F5 / Akamai)</text>
<text class="section-sub" x="55" y="216">tier 1 — edge · dmz</text>

<g class="process" transform="translate(280,225)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">DDoS check + IP whitelist</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Behavioral analysis, geo routing</text>
</g>
<!-- reject -->
<line x1="520" y1="245" x2="600" y2="245" class="reject-line" marker-end="url(#ahr)"/>
<g class="reject" transform="translate(600,228)"><rect x="0" y="0" width="140" height="34"/><text class="label" x="70" y="21" text-anchor="middle" fill="#c00">Block (DDoS/IP)</text></g>

<line x1="400" y1="265" x2="400" y2="290" marker-end="url(#ah)"/>
<g class="process" transform="translate(280,290)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">TLS terminate → re-encrypt mTLS</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Public cert → internal cert</text>
</g>

<line x1="400" y1="330" x2="400" y2="380" marker-end="url(#ah)"/>
<text class="connector" x="408" y="360">mTLS (internal certs)</text>

<!-- ==================== SECTION 2: INTERNAL LB ==================== -->
<rect class="section-bg" x="30" y="370" width="740" height="120"/>
<text class="section-title" x="55" y="400">Internal Load Balancer (K8s Ingress — HAProxy / Envoy)</text>
<text class="section-sub" x="55" y="416">tier 1 — L7 routing</text>

<g class="process" transform="translate(280,425)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">L7 route by URL path</text>
  <text class="sub" x="120" y="32" text-anchor="middle">/v1/agent → gateway-svc (round-robin)</text>
</g>

<!-- health check side effect -->
<line x1="520" y1="445" x2="600" y2="445" class="side-line" marker-end="url(#ahg)"/>
<g class="side-effect" transform="translate(600,428)"><rect x="0" y="0" width="140" height="34"/><text class="side-label" x="70" y="21" text-anchor="middle">/healthz every 10-15s</text></g>

<line x1="400" y1="465" x2="400" y2="520" marker-end="url(#ah)"/>

<!-- ==================== SECTION 3: API GATEWAY ==================== -->
<rect class="section-bg" x="30" y="510" width="740" height="420"/>
<text class="section-title" x="55" y="540">API Gateway (FastAPI — separate Deployment, 3-5 pods)</text>
<text class="section-sub" x="55" y="556">tier 2 — 6-step security pipeline</text>

<!-- Step 1: JWT -->
<g class="process" transform="translate(280,565)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">① JWT validation</text>
  <text class="sub" x="120" y="32" text-anchor="middle">JWKS verify, extract user claims</text>
</g>
<line x1="520" y1="585" x2="600" y2="585" class="reject-line" marker-end="url(#ahr)"/>
<g class="reject" transform="translate(600,568)"><rect x="0" y="0" width="120" height="34"/><text class="label" x="60" y="21" text-anchor="middle" fill="#c00">401 Unauth</text></g>
<line x1="400" y1="605" x2="400" y2="625" marker-end="url(#ah)"/>

<!-- Step 2: Rate limit -->
<g class="process" transform="translate(280,625)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">② Rate limit check (Redis)</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Sliding window per user + team</text>
</g>
<line x1="520" y1="645" x2="600" y2="645" class="reject-line" marker-end="url(#ahr)"/>
<g class="reject" transform="translate(600,628)"><rect x="0" y="0" width="120" height="34"/><text class="label" x="60" y="21" text-anchor="middle" fill="#c00">429 Limit</text></g>
<line x1="400" y1="665" x2="400" y2="685" marker-end="url(#ah)"/>

<!-- Step 3: Validate -->
<g class="process" transform="translate(280,685)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">③ Request validation (Pydantic)</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Schema check, payload size limit</text>
</g>
<line x1="520" y1="705" x2="600" y2="705" class="reject-line" marker-end="url(#ahr)"/>
<g class="reject" transform="translate(600,688)"><rect x="0" y="0" width="120" height="34"/><text class="label" x="60" y="21" text-anchor="middle" fill="#c00">422 Invalid</text></g>
<line x1="400" y1="725" x2="400" y2="745" marker-end="url(#ah)"/>

<!-- Step 4: Trace -->
<g class="process" transform="translate(280,745)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">④ Trace ID (OpenTelemetry)</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Create span, inject traceparent</text>
</g>
<line x1="400" y1="785" x2="400" y2="805" marker-end="url(#ah)"/>

<!-- Step 5: Audit -->
<g class="side-effect" transform="translate(280,805)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="side-label" x="120" y="16" text-anchor="middle">⑤ Audit log (async, fire-and-forget)</text>
  <text class="sub" x="120" y="32" text-anchor="middle">→ PostgreSQL audit_log table</text>
</g>
<line x1="400" y1="845" x2="400" y2="865" marker-end="url(#ah)"/>

<!-- Step 6: Forward -->
<g class="process" transform="translate(280,865)">
  <rect x="0" y="0" width="240" height="40"/>
  <text class="label" x="120" y="16" text-anchor="middle">⑥ Forward to agent pod</text>
  <text class="sub" x="120" y="32" text-anchor="middle">K8s Service round-robin</text>
</g>

<line x1="400" y1="905" x2="400" y2="970" marker-end="url(#ah)"/>

<!-- ==================== SECTION 4: AGENT POD ==================== -->
<rect class="section-bg" x="30" y="955" width="1430" height="3100"/>
<text class="section-title" x="55" y="985">Agent Pod (FastAPI + LangGraph — stateless, 3-20 pods via HPA)</text>
<text class="section-sub" x="55" y="1001">tier 3 — orchestration + compute</text>

<!-- Hydrate state -->
<g class="process" transform="translate(280,1015)">
  <rect x="0" y="0" width="240" height="44"/>
  <text class="label" x="120" y="16" text-anchor="middle">Hydrate conversation state</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Redis → (miss) → PostgreSQL → populate Redis</text>
</g>
<line x1="400" y1="1059" x2="400" y2="1090" marker-end="url(#ah)"/>

<!-- Intent classify -->
<g class="process" transform="translate(280,1090)">
  <rect x="0" y="0" width="240" height="44"/>
  <text class="label" x="120" y="16" text-anchor="middle">Intent classification (DistilBERT)</text>
  <text class="sub" x="120" y="32" text-anchor="middle">~2ms, zero LLM cost</text>
</g>
<line x1="400" y1="1134" x2="400" y2="1165" marker-end="url(#ah)"/>

<!-- Intent decision diamond -->
<g transform="translate(400,1185)">
  <polygon points="0,-25 80,0 0,25 -80,0" fill="#f8f8f8" stroke="#222" stroke-width="1.2"/>
  <text class="label" x="0" y="4" text-anchor="middle" font-size="11">Intent?</text>
</g>

<!-- Greeting path -->
<line x1="480" y1="1185" x2="600" y2="1185" class="reject-line" marker-end="url(#ahr)"/>
<g class="reject" transform="translate(600,1168)"><rect x="0" y="0" width="160" height="34" style="stroke:#666"/><text class="label" x="80" y="21" text-anchor="middle" style="fill:#666">Greeting → template</text></g>

<!-- FAQ path -->
<line x1="480" y1="1175" x2="600" y2="1140" class="side-line" marker-end="url(#ahg)"/>
<g class="side-effect" transform="translate(600,1123)"><rect x="0" y="0" width="160" height="34"/><text class="side-label" x="80" y="21" text-anchor="middle">FAQ → cached answer</text></g>

<!-- Complex → supervisor -->
<line x1="400" y1="1210" x2="400" y2="1270" marker-end="url(#ah)"/>
<text class="connector" x="408" y="1245">complex / multi-step</text>

<!-- ===== OUTER LOOP: SUPERVISOR ===== -->
<rect class="loop-bg" x="60" y="1260" width="1380" height="2120"/>
<text class="loop-label" x="80" y="1285">OUTER LOOP — Supervisor orchestrates between sub-agents</text>

<!-- Supervisor LLM call -->
<g class="process" transform="translate(280,1300)">
  <rect x="0" y="0" width="240" height="50" style="stroke-width:1.8"/>
  <text class="label" x="120" y="16" text-anchor="middle">Supervisor LLM (Haiku, ~150ms)</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Sees: query + completed results</text>
  <text class="sub" x="120" y="44" text-anchor="middle">Decides: which sub-agent next?</text>
</g>
<line x1="400" y1="1350" x2="400" y2="1390" marker-end="url(#ah)"/>

<!-- Supervisor decision -->
<g transform="translate(400,1410)">
  <polygon points="0,-25 100,0 0,25 -100,0" fill="#f8f8f8" stroke="#222" stroke-width="1.2"/>
  <text class="label" x="0" y="4" text-anchor="middle" font-size="11">Route to?</text>
</g>

<!-- DONE path -->
<line x1="500" y1="1410" x2="680" y2="1410" marker-end="url(#ah)"/>
<text class="connector" x="560" y="1403">done</text>
<g class="process" transform="translate(680,1393)">
  <rect x="0" y="0" width="120" height="34"/>
  <text class="label" x="60" y="21" text-anchor="middle">→ Guardrails</text>
</g>
<!-- Arrow from "done" to guardrails section (will connect later) -->
<line x1="740" y1="1427" x2="740" y2="3420" marker-end="url(#ah)"/>
<text class="connector" x="748" y="1480">skip to guardrails</text>

<!-- PARALLEL fan-out -->
<line x1="400" y1="1435" x2="400" y2="1480" marker-end="url(#ah)"/>
<text class="connector" x="408" y="1463">sub-agents needed</text>

<!-- Parallel decision -->
<g transform="translate(400,1500)">
  <polygon points="0,-25 100,0 0,25 -100,0" fill="#f8f8f8" stroke="#222" stroke-width="1.2"/>
  <text class="label" x="0" y="4" text-anchor="middle" font-size="11">Parallel?</text>
</g>

<!-- Sequential path -->
<line x1="300" y1="1500" x2="140" y2="1500" marker-end="url(#ah)"/>
<text class="connector" x="195" y="1493">sequential</text>
<line x1="140" y1="1500" x2="140" y2="1570" marker-end="url(#ah)"/>

<!-- Parallel path -->
<line x1="400" y1="1525" x2="400" y2="1570" marker-end="url(#ah)"/>
<text class="connector" x="408" y="1553">independent agents run simultaneously</text>

<!-- ===== PARALLEL EXECUTION BLOCK ===== -->
<rect x="80" y="1565" width="830" height="310" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="5 3" rx="6"/>
<text class="loop-label" x="100" y="1588">PARALLEL FAN-OUT (e.g. portfolio + research run simultaneously)</text>

<!-- Sub-agent A (left) -->
<rect class="loop-bg" x="100" y="1600" width="360" height="250"/>
<text class="loop-label" x="120" y="1620">SUB-AGENT A — INNER REACT LOOP</text>

<g class="process" transform="translate(130,1635)">
  <rect x="0" y="0" width="300" height="40"/>
  <text class="label" x="150" y="16" text-anchor="middle">Sub-agent LLM call (Sonnet)</text>
  <text class="sub" x="150" y="32" text-anchor="middle">Sees ONLY this agent's scoped tools</text>
</g>
<line x1="280" y1="1675" x2="280" y2="1700" marker-end="url(#ah)"/>

<!-- tool_call or text decision -->
<g transform="translate(280,1720)">
  <polygon points="0,-20 70,0 0,20 -70,0" fill="#f8f8f8" stroke="#222" stroke-width="1"/>
  <text class="label" x="0" y="4" text-anchor="middle" font-size="10">Response?</text>
</g>

<!-- tool_call path loops back -->
<line x1="210" y1="1720" x2="150" y2="1720" marker-end="url(#ah)"/>
<text class="connector" x="160" y="1712">tool_call</text>
<g class="process" transform="translate(100,1745)">
  <rect x="0" y="0" width="120" height="30"/>
  <text class="label" x="60" y="12" text-anchor="middle" font-size="10">Execute via MCP</text>
  <text class="sub" x="60" y="24" text-anchor="middle">timeout 5-10s</text>
</g>
<!-- loop arrow back up -->
<path d="M160,1745 L160,1730 Q160,1660 200,1660 L280,1660 L280,1655" fill="none" stroke="#222" stroke-width="0.8" marker-end="url(#ah)"/>
<text class="connector" x="168" y="1737">result → call LLM again</text>

<!-- text/final answer exits -->
<line x1="280" y1="1740" x2="280" y2="1810" marker-end="url(#ah)"/>
<text class="connector" x="288" y="1790">text (done)</text>
<g class="process" transform="translate(220,1810)">
  <rect x="0" y="0" width="120" height="26"/>
  <text class="label" x="60" y="16" text-anchor="middle" font-size="10">Write to shared state</text>
</g>

<!-- Sub-agent B (right) -->
<rect class="loop-bg" x="520" y="1600" width="360" height="250"/>
<text class="loop-label" x="540" y="1620">SUB-AGENT B — INNER REACT LOOP</text>

<g class="process" transform="translate(550,1635)">
  <rect x="0" y="0" width="300" height="40"/>
  <text class="label" x="150" y="16" text-anchor="middle">Sub-agent LLM call (Sonnet)</text>
  <text class="sub" x="150" y="32" text-anchor="middle">Sees ONLY this agent's scoped tools</text>
</g>
<line x1="700" y1="1675" x2="700" y2="1700" marker-end="url(#ah)"/>

<g transform="translate(700,1720)">
  <polygon points="0,-20 70,0 0,20 -70,0" fill="#f8f8f8" stroke="#222" stroke-width="1"/>
  <text class="label" x="0" y="4" text-anchor="middle" font-size="10">Response?</text>
</g>

<line x1="630" y1="1720" x2="570" y2="1720" marker-end="url(#ah)"/>
<text class="connector" x="580" y="1712">tool_call</text>
<g class="process" transform="translate(520,1745)">
  <rect x="0" y="0" width="120" height="30"/>
  <text class="label" x="60" y="12" text-anchor="middle" font-size="10">Execute via MCP</text>
  <text class="sub" x="60" y="24" text-anchor="middle">timeout 5-10s</text>
</g>
<path d="M580,1745 L580,1730 Q580,1660 620,1660 L700,1660 L700,1655" fill="none" stroke="#222" stroke-width="0.8" marker-end="url(#ah)"/>
<text class="connector" x="588" y="1737">result → call LLM again</text>

<line x1="700" y1="1740" x2="700" y2="1810" marker-end="url(#ah)"/>
<text class="connector" x="708" y="1790">text (done)</text>
<g class="process" transform="translate(640,1810)">
  <rect x="0" y="0" width="120" height="26"/>
  <text class="label" x="60" y="16" text-anchor="middle" font-size="10">Write to shared state</text>
</g>

<!-- Both join -->
<line x1="280" y1="1836" x2="280" y2="1900" marker-end="url(#ah)"/>
<line x1="700" y1="1836" x2="700" y2="1870" stroke="#222" stroke-width="1"/>
<line x1="700" y1="1870" x2="400" y2="1870" stroke="#222" stroke-width="1"/>
<line x1="400" y1="1870" x2="400" y2="1900" marker-end="url(#ah)"/>
<text class="connector" x="470" y="1865">join — wait for all parallel agents</text>

<!-- Checkpoint after parallel -->
<g class="checkpoint" transform="translate(320,1900)">
  <rect x="0" y="0" width="160" height="30"/>
  <text class="label" x="80" y="19" text-anchor="middle" font-size="10">CHECKPOINT → PostgreSQL</text>
</g>
<line x1="400" y1="1930" x2="400" y2="1960" marker-end="url(#ah)"/>

<!-- Return to supervisor -->
<g class="process" transform="translate(280,1960)">
  <rect x="0" y="0" width="240" height="50" style="stroke-width:1.8"/>
  <text class="label" x="120" y="16" text-anchor="middle">Supervisor LLM #2 (Haiku)</text>
  <text class="sub" x="120" y="32" text-anchor="middle">Evaluates results, decides next agent</text>
  <text class="sub" x="120" y="44" text-anchor="middle">Can CHANGE PLAN based on actual results</text>
</g>
<line x1="400" y1="2010" x2="400" y2="2050" marker-end="url(#ah)"/>

<!-- Next agent decision -->
<g transform="translate(400,2070)">
  <polygon points="0,-25 100,0 0,25 -100,0" fill="#f8f8f8" stroke="#222" stroke-width="1.2"/>
  <text class="label" x="0" y="4" text-anchor="middle" font-size="11">More agents?</text>
</g>

<!-- Sequential agent C -->
<line x1="400" y1="2095" x2="400" y2="2140" marker-end="url(#ah)"/>
<text class="connector" x="408" y="2122">yes — e.g. compliance (needs portfolio data)</text>

<!-- ===== SEQUENTIAL SUB-AGENT C ===== -->
<rect class="loop-bg" x="100" y="2135" width="600" height="250"/>
<text class="loop-label" x="120" y="2158">SUB-AGENT C (sequential — depends on A+B results) — INNER REACT LOOP</text>

<g class="process" transform="translate(180,2170)">

<script>
const canvas = document.getElementById('canvas');
const svg = document.getElementById('svg');
let scale = 0.55, panX = 0, panY = 0, isPanning = false, startX, startY;

function updateTransform() {
  svg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  svg.style.transformOrigin = '0 0';
}

function zoomIn() { scale = Math.min(scale * 1.2, 3); updateTransform(); }
function zoomOut() { scale = Math.max(scale / 1.2, 0.15); updateTransform(); }
function resetView() { scale = 0.55; panX = 0; panY = 0; updateTransform(); }

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.15, Math.min(3, scale * delta));
  updateTransform();
}, { passive: false });

canvas.addEventListener('mousedown', e => { isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY; });
canvas.addEventListener('mousemove', e => { if (!isPanning) return; panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); });
canvas.addEventListener('mouseup', () => isPanning = false);
canvas.addEventListener('mouseleave', () => isPanning = false);

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isPanning = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; }
  if (e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isPanning) { panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY; updateTransform(); }
  if (e.touches.length === 2) { const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); scale = Math.max(0.15, Math.min(3, scale * (dist / lastTouchDist))); lastTouchDist = dist; updateTransform(); }
}, { passive: false });
canvas.addEventListener('touchend', () => isPanning = false);

updateTransform();
</script>
